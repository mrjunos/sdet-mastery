<script type="text/markdown" id="src"># C4 · Módulo 2 — Sensores y métricas: medir una empresa cuando el mundo no es determinista

> El sueño del fundador: "quiero sensores que midan todo". La realidad: la mitad de lo que importa en una empresa **no tiene sensor posible** — la calidad en taza, la satisfacción del cliente, si una decisión fue buena. Este módulo enseña a instrumentar lo determinista, a *evaluar* lo que no lo es (la escalera de evals, otra vez, a otra altitud), y a no morir de Goodhart en el intento.

## 🗺️ Mapa visual

```mermaid
flowchart TB
    Q["¿Qué necesito saber<br/>para decidir?"]
    Q --> D["📏 Señales deterministas<br/>humedad, kg, °C, $$<br/>→ sensor físico / registro"]
    Q --> N["🌫️ Señales no-deterministas<br/>calidad de taza, demanda,<br/>output de agentes"]
    N --> E1["Peldaño 1: proxies medibles<br/>(defectos/kg, devoluciones, merma)"]
    N --> E2["Peldaño 2: evaluación experta<br/>calibrada (cata, revisión)"]
    N --> E3["Peldaño 3: distribuciones + SLOs<br/>(% lotes ≥ threshold, deriva)"]
    D --> T["📊 El tablero del fundador<br/>pocos números que<br/>cambian decisiones"]
    E1 --> T
    E2 --> T
    E3 --> T
    T --> W["⚠️ Goodhart<br/>toda métrica-objetivo<br/>será gamed"]
```

## 📖 Concepto

### El mapa de señales: primero clasifica, después instrumenta

En Cafetal conviven dos mundos, y confundirlos es el error #1:

| Mundo | Señales | Cómo se mide |
|-------|---------|--------------|
| **Determinista** | Humedad del grano, densidad, temperatura y horas de secado, kg por lote, merma en trilla, precio de bolsa, cash, días de inventario | Sensor físico o registro directo. Barato, confiable, automatizable — instruméntalo TODO. Es tu peldaño 1. |
| **No-determinista** | Calidad en taza, decisión de comprar un lote, demanda futura, si el Selector clasifica "bien", si un cliente volverá | No hay sensor. Hay **evaluación**: proxies, jueces calibrados y distribuciones. |

La regla de oro traduce directo del Curso 3: **mide en el peldaño más bajo que responda la pregunta.** ¿Cuánta agua tiene el grano? Sensor, punto. ¿Este lote es especial? No hay sensor de "especial" — hay proxies (defectos/kg del Selector), juicio experto (cata) y estadística (distribución de puntajes por finca de origen).

### La cata ES un LLM-as-a-judge (humano)

Aquí la maestría te da una ventaja injusta. Un catador es exactamente un juez model-graded: recibe un input (la taza), aplica una rúbrica (protocolo de puntaje 100 pts) y emite un score. Y tiene LOS MISMOS problemas que estudiaste en spec-02:

- **No-determinismo**: el mismo catador puntúa distinto la misma taza en días distintos.
- **Sesgos**: orden de las muestras, fatiga, expectativa ("este lote viene de la finca buena").
- **Y la misma solución: meta-evaluación.** Catas ciegas, muestras repetidas de control para medir consistencia intra-catador, y agreement entre catadores. Un catador cuya varianza no conoces es un juez sin calibrar — sus números son ruido con decimales.

Generaliza: **toda evaluación experta en tu empresa (catas, revisiones de calidad, diligencia de un lote) es un juez que necesita calibración.** Rúbricas específicas, evaluación ciega cuando se pueda, y consistencia medida. Esto vale para humanos y para los agentes de IA que pongas a evaluar cosas.

### Gobernar distribuciones: los SLOs del negocio

En lo no-determinista no preguntas "¿está bien?" sino "¿la distribución está donde debe?" — igual que el pass rate de una eval suite:

- No "¿este lote es bueno?" → **"¿qué % de lotes supera 85 pts este trimestre, y cómo se mueve?"**
- No "¿el Selector acierta?" → **"¿el disagreement Selector-vs-catador se mantiene bajo el 8%, o está derivando?"** (la deriva del Selector es la deriva de modelo de spec-05, literal)
- No "¿los clientes están contentos?" → **"¿la tasa de recompra por cohorte sube o baja?"**

Cada una con su **SLO**: el threshold explícito que separa "normal" de "actúa". Sin threshold no hay sensor — hay decoración.

### Leading vs lagging: los sensores que avisan a tiempo

Las métricas lagging te cuentan el pasado (ventas del trimestre, taza final del lote). Las leading predicen (humedad en secado predice taza; consultas de clientes predicen ventas; % de flor cuajada predice cosecha). El arte del tablero es **encontrar el leading de cada lagging que te importa** — porque sobre el lagging ya no puedes actuar. En Cafetal la cadena es larga y hermosa: lo que mides en finca en marzo es la taza de septiembre. La empresa que instrumenta la cadena completa aprende dónde se gana la calidad de verdad (¿beneficio? ¿secado? ¿selección?) — y esa curva de aprendizaje ES el foso competitivo.

### Goodhart: la ley que rompe tableros

*"Cuando una medida se convierte en objetivo, deja de ser buena medida."* Ya la viste con cobertura de código; en empresa es peor porque hay incentivos económicos:

- Pagas al equipo de selección por "% de granos aprobados" → aprobarán granos dudosos.
- El objetivo del Selector es "minimizar rechazos" → aprenderá a ser laxo (¡y tu eval no lo verá si mide lo mismo!).
- "Notas al vault por semana" como métrica de documentación → notas basura.

Defensas: (1) **pares de métricas en tensión** — % aprobado JUNTO a devoluciones de clientes; velocidad JUNTO a calidad; nunca una sola; (2) medir el **resultado**, no la actividad; (3) los números del tablero **se observan, los incentivos se atan con muchísimo cuidado y nunca a un proxy fácil de inflar**.

> **La frase del módulo:** *instrumenta todo lo determinista, evalúa lo demás con jueces calibrados y distribuciones, y elige cada métrica del tablero preguntando: ¿qué decisión cambia este número? Si ninguna — decoración.*

## 🔨 Lab guiado — El mapa de sensores de la finca a la taza

**Paso 1 — Inventario de preguntas (`02-mapa-de-sensores.md`).** Antes de sensores, preguntas. Lista las ~15 preguntas que Cafetal necesita responder para operar, de la finca a la taza: ¿cuándo cosechar? ¿el secado va bien? ¿compro este lote externo? ¿este lote es especial? ¿el Selector sigue siendo confiable? ¿a qué cliente priorizo? ¿me alcanza el cash? Cada fila del mapa nace de una pregunta — no al revés.

**Paso 2 — El mapa.** Tabla con columnas: pregunta → señal → **tipo (determinista / no-determinista)** → fuente (sensor físico, registro del Selector, cata, agente, humano) → frecuencia → SLO/threshold → decisión que dispara. Mínimo 15 filas. Obligatorio: que aparezcan las dos clases de señal, y que TODA fila tenga decisión asociada — la fila sin decisión se borra (esa es la disciplina del módulo).

**Paso 3 — Diseña la meta-eval de la cata.** Media página: protocolo de cata ciega de Cafetal — cómo se codifican las muestras, cada cuántas sesiones se mete una muestra de control repetida, cómo se mide la consistencia del catador y el agreement Selector-vs-catador, y qué pasa cuando la consistencia cae (¿recalibrar? ¿descansar? ¿dos catadores?).

**Paso 4 — El tablero del fundador.** De tu mapa, elige **los 5 números** que verías cada lunes. Regla: al menos 2 leading, al menos 1 de calidad, al menos 1 de dinero, y ninguno inflable sin que otro del tablero lo delate (verifica los pares en tensión explícitamente — escribe cuál vigila a cuál).

**Paso 5 — El sensor de la memoria.** Meta-nivel: define la métrica de salud del vault de Cafetal (M1). Sugerencia: *decisiones consultadas / decisiones escritas* por trimestre, y % de decisiones con revisión vencida. La memoria también es un sistema que se degrada sin observabilidad.

**Paso 6 — Commit** (`C4-M2: mapa de sensores + tablero del fundador`).

## 🎯 Reto

**El Selector y el catador discrepan.** Escenario real e inevitable: el Selector aprueba un lote (2.1% defectos, dentro de SLO) y tu mejor catador lo puntúa 82 — por debajo del threshold de "especial". El cliente premium espera ese lote la próxima semana. Escribe `labs/cafetal/retos/discrepancia-selector-catador.md`: (1) ¿qué haces con EL LOTE (decisión de negocio, hoy)?; (2) ¿qué haces con LA DISCREPANCIA (decisión de sistema: es un caso para el golden dataset de quién — del Selector o del catador)?; (3) diseña la regla general: ¿cuándo manda la máquina, cuándo el humano, y cómo se registra cada desacuerdo para que el sistema aprenda? Pista: la respuesta madura no es "siempre el humano" — es entender que miden cosas distintas (defectos físicos ≠ calidad sensorial) y que la discrepancia es la señal más valiosa que produce tu empresa.

## ✅ Checklist de dominio

- [ ] Clasifico cualquier señal del negocio como determinista o no-determinista sin dudar
- [ ] Puedo explicar por qué la cata es un LLM-as-a-judge y qué es su meta-eval
- [ ] Cada fila de mi mapa de sensores tiene threshold Y decisión asociada
- [ ] Mi tablero tiene 5 números con pares en tensión verificados contra Goodhart
- [ ] Sé distinguir leading de lagging y tengo la cadena finca→taza instrumentada en el mapa
- [ ] Puedo defender qué se observa vs. qué se incentiva, y por qué no son lo mismo

## 💬 Preguntas de inversionista/board

1. *"¿Cuáles son los 5 números que miras cada lunes y por qué esos?"* (tu tablero, con la lógica leading/lagging y pares en tensión)
2. *"¿Cómo sabes que tu IA de selección sigue funcionando dentro de 6 meses?"* (deriva medida: disagreement Selector-vs-catador con SLO — no fe)
3. *"La calidad del café es subjetiva. ¿Cómo la conviertes en un número confiable?"* (jueces calibrados: cata ciega, controles repetidos, agreement — la meta-eval)
4. *"¿Qué métrica de tu empresa es más fácil de inflar y qué la vigila?"* (si no tienes respuesta inmediata, Goodhart ya te está pasando)
5. *"¿Qué señal de este trimestre te haría cambiar la estrategia, no solo la operación?"* (separa al fundador que mide para reportar del que mide para decidir)
