name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'html-export/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez; no cancelar uno en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site (html-export/ como raíz)
        uses: actions/upload-pages-artifact@v3
        with:
          path: html-export

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
